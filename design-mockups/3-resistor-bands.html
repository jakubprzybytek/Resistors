<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Resistor Bands</title>
<style>
  :root {
    --bg: #fbf6ee;
    --surface: #ffffff;
    --border: #ecdfc9;
    --text: #2d2013;
    --text-dim2: #8a7b63;
    --accent: #c2410c;
    --accent-dim: #9a3412;
    --gold: #b45309;
    --accent-soft: #fdece1;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    font-family: "Segoe UI", system-ui, sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 3rem 1rem;
  }
  .app { width: 100%; max-width: 560px; }
  .band-strip { height: 8px; border-radius: 999px; margin-bottom: 1.5rem;
    background: linear-gradient(90deg, #7c4a1e 0 20%, #c2410c 20% 40%, #d97706 40% 60%, #eab308 60% 80%, #b45309 80% 100%); }
  .app__title {
    font-size: 1.7rem;
    font-weight: 800;
    text-align: center;
    margin: 0 0 0.4rem;
    color: var(--accent-dim);
  }
  .app__subtitle {
    text-align: center;
    color: var(--text-dim2);
    font-size: 0.95rem;
    margin: 0 0 2rem;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.75rem;
    margin-bottom: 1.25rem;
    box-shadow: 0 6px 20px rgba(120,80,20,0.08);
  }
  .field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.2rem; }
  .field span { font-size: 0.85rem; color: var(--gold); font-weight: 700; }
  textarea, input {
    font: inherit;
    background: #fffaf3;
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 0.65rem 0.8rem;
    resize: vertical;
  }
  textarea:focus, input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  button {
    width: 100%;
    padding: 0.75rem;
    font: inherit;
    font-weight: 700;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(194,65,12,0.3);
  }
  button:hover { background: var(--accent-dim); }
  .result__status {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--accent-dim);
    background: var(--accent-soft);
    padding: 0.3rem 0.7rem;
    border-radius: 999px;
    margin-bottom: 1rem;
  }
  .result__value { font-size: 2rem; font-weight: 800; margin: 0 0 0.3rem; color: var(--accent-dim); }
  .result__deviation { color: var(--text-dim2); margin: 0 0 1rem; font-size: 0.9rem; }
  .result__description {
    font-family: "Cascadia Code", Consolas, monospace;
    background: #fffaf3;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 0.9rem;
    font-size: 0.95rem;
    word-break: break-word;
    color: var(--gold);
  }
  .swatches { display: flex; gap: 8px; margin-top: 1.5rem; justify-content: center; }
  .swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.06); }
</style>
</head>
<body>
  <div class="app">
    <div class="band-strip"></div>
    <h1 class="app__title">Resistor Network Calculator</h1>
    <p class="app__subtitle">Find a resistor combination that hits your target</p>

    <div class="card">
      <label class="field">
        <span>Available Values (Ω)</span>
        <textarea rows="4">100, 220, 330</textarea>
      </label>
      <label class="field">
        <span>Target Resistance (Ω)</span>
        <input type="text" value="660" />
      </label>
      <button>Calculate</button>
    </div>

    <div class="card">
      <span class="result__status">✓ Exact match</span>
      <p class="result__value">660.00 Ω</p>
      <p class="result__deviation">2 resistors · deviation +0.00%</p>
      <p class="result__description">(330Ω + 330Ω)</p>
    </div>

    <div class="swatches">
      <div class="swatch" style="background:#fbf6ee"></div>
      <div class="swatch" style="background:#c2410c"></div>
      <div class="swatch" style="background:#b45309"></div>
      <div class="swatch" style="background:#2d2013"></div>
      <div class="swatch" style="background:#eab308"></div>
    </div>
  </div>
</body>
</html>
